# Weekly scheduled bump: slide the demo seed's dates onto the current date on
# staging and production so the upcoming-meetings window never drifts into the
# past. Runs the same scripts/bump-seed-dates.sql that the seed generator appends
# to a fresh seed, so there is no separate manual "fix" step.
#
# Requires a CLOUDFLARE_API_TOKEN repo secret (Workers Scripts + D1 scope).
# Scheduled runs use the default branch, so this and the prod database_id must be
# on main for the production leg to target the real database.
name: Bump seed dates

on:
  schedule:
    - cron: '0 9 * * 1' # Mondays 09:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bump:
    if: github.repository == 'brettdavies/cf_office_hours'
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        env: [staging, production]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
      - name: Bump seed dates
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ENV_NAME: ${{ matrix.env }}
          DB_NAME: ${{ matrix.env == 'production' && 'cf-office-hours' || 'cf-office-hours-staging' }}
        run: npx wrangler@4.102.0 d1 execute "$DB_NAME" --env "$ENV_NAME" --remote --file=../../scripts/bump-seed-dates.sql
